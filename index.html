<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Логопедическая игра: Слоговые домики</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            background-color: #f0f9ff;
        }

        .game-bg {
            background-image: url('assets/bg.jpg');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
        }

        .house {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: default;
        }

        .house.drag-over {
            transform: scale(1.05);
            filter: brightness(1.1);
        }

        .item {
            cursor: grab;
            transition: transform 0.2s ease;
            touch-action: none; /* Для мобильных устройств */
        }

        .item:active {
            cursor: grabbing;
        }

        .hidden-item {
            display: none !important;
        }

        #victory-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>

<div class="game-bg">
    <h1 class="text-3xl md:text-5xl font-bold text-white drop-shadow-lg bg-blue-500/50 px-6 py-2 rounded-full">
        Разложи картинки по домикам
    </h1>

    <!-- Контейнер для предметов, которые нужно распределить -->
    <div id="item-pool" class="flex flex-wrap justify-center gap-4 p-4 bg-white/30 backdrop-blur-md rounded-3xl min-h-[150px] w-full max-w-4xl border-2 border-white/50">
        <!-- Сюда JS добавит картинки -->
    </div>

    <!-- Контейнер для домиков -->
    <div class="flex justify-around w-full max-w-6xl mb-10">
        <div class="house-wrapper flex flex-col items-center" data-syllables="1">
            <img src="assets/house1.png" alt="1 слог" class="house w-32 md:w-48 lg:w-64" ondragover="allowDrop(event)" ondragleave="handleLeave(event)" ondrop="drop(event)">
            <span class="mt-2 text-xl font-bold text-white bg-blue-600 px-4 py-1 rounded-full shadow-lg">1 слог</span>
        </div>
        
        <div class="house-wrapper flex flex-col items-center" data-syllables="2">
            <img src="assets/house2.png" alt="2 слога" class="house w-32 md:w-48 lg:w-64" ondragover="allowDrop(event)" ondragleave="handleLeave(event)" ondrop="drop(event)">
            <span class="mt-2 text-xl font-bold text-white bg-blue-600 px-4 py-1 rounded-full shadow-lg">2 слога</span>
        </div>

        <div class="house-wrapper flex flex-col items-center" data-syllables="3">
            <img src="assets/house3.png" alt="3 слога" class="house w-32 md:w-48 lg:w-64" ondragover="allowDrop(event)" ondragleave="handleLeave(event)" ondrop="drop(event)">
            <span class="mt-2 text-xl font-bold text-white bg-blue-600 px-4 py-1 rounded-full shadow-lg">3 слога</span>
        </div>
    </div>
</div>

<!-- Модальное окно окончания игры -->
<div id="victory-modal">
    <div class="bg-white p-8 rounded-3xl text-center shadow-2xl transform scale-110">
        <h2 class="text-4xl font-bold text-green-600 mb-4">Ура! Все дома! 🌟</h2>
        <p class="text-xl text-gray-700 mb-6">Ты отлично умеешь делить слова на слоги.</p>
        <button onclick="location.reload()" class="bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-8 rounded-full text-xl transition-colors">
            Играть еще раз
        </button>
    </div>
</div>

<script>
const itemsData = [
    { id: 'lev', syllables: 1, src: 'assets/lev.png', name: 'Лев' },
    { id: 'mak', syllables: 1, src: 'assets/mak.png', name: 'Мак' },
    { id: 'kot', syllables: 1, src: 'assets/kot.png', name: 'Кот' },
    { id: 'lisa', syllables: 2, src: 'assets/lisa.png', name: 'Лиса' },
    { id: 'pauk', syllables: 2, src: 'assets/pauk.png', name: 'Паук' },
    { id: 'fish', syllables: 2, src: 'assets/fish.png', name: 'Рыба' },
    { id: 'cow', syllables: 3, src: 'assets/cow.png', name: 'Корова' },
    { id: 'tree', syllables: 3, src: 'assets/tree.png', name: 'Дерево' },
    { id: 'car', syllables: 3, src: 'assets/car.png', name: 'Машина' }
];

let itemsLeft = itemsData.length;

window.onload = () => {
    const pool = document.getElementById('item-pool');
    
    // Перемешиваем массив, чтобы картинки каждый раз были в разном порядке
    const shuffledItems = [...itemsData].sort(() => Math.random() - 0.5);

    shuffledItems.forEach(item => {
        const img = document.createElement('img');
        img.src = item.src;
        img.id = item.id;
        img.alt = item.name;
        img.className = 'item w-20 h-20 md:w-28 md:h-28 object-contain bg-white rounded-xl p-2 shadow-md border-2 border-white hover:border-yellow-400';
        img.draggable = true;
        img.setAttribute('data-syllables', item.syllables);
        
        // События для Drag-and-Drop
        img.ondragstart = (e) => {
            e.dataTransfer.setData('text/plain', item.id);
            img.classList.add('opacity-50');
        };
        
        img.ondragend = () => {
            img.classList.remove('opacity-50');
        };

        pool.appendChild(img);
    });
};

function allowDrop(ev) {
    ev.preventDefault();
    ev.currentTarget.classList.add('drag-over');
}

function handleLeave(ev) {
    ev.currentTarget.classList.remove('drag-over');
}

function drop(ev) {
    ev.preventDefault();
    const house = ev.currentTarget;
    house.classList.remove('drag-over');
    
    const itemId = ev.dataTransfer.getData('text/plain');
    const draggedElement = document.getElementById(itemId);
    
    if (!draggedElement) return;

    const itemSyllables = parseInt(draggedElement.getAttribute('data-syllables'));
    const houseSyllables = parseInt(house.parentElement.getAttribute('data-syllables'));

    if (itemSyllables === houseSyllables) {
        // Правильно!
        draggedElement.classList.add('hidden-item');
        itemsLeft--;
        
        // Визуальный эффект на домике
        house.style.filter = 'brightness(1.3) sepia(0.5) hue-rotate(90deg)';
        setTimeout(() => house.style.filter = '', 500);

        if (itemsLeft === 0) {
            document.getElementById('victory-modal').style.display = 'flex';
        }
    } else {
        // Ошибка - можно добавить тряску домика
        house.style.transform = 'translateX(10px)';
        setTimeout(() => house.style.transform = 'translateX(-10px)', 100);
        setTimeout(() => house.style.transform = 'translateX(0)', 200);
        
        // Окрасим домик в красный на мгновение
        house.style.filter = 'brightness(0.8) sepia(1) hue-rotate(-50deg)';
        setTimeout(() => house.style.filter = '', 500);
    }
}

// Добавляем поддержку тач-событий для мобильных устройств (упрощенная версия через полифилл или прямую логику была бы больше, 
// поэтому пока оставим стандартный DnD, который работает на большинстве планшетов).
</script>

</body>
</html>
