<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Слоговые домики</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            touch-action: none; /* Отключаем лишние жесты браузера */
            overflow: hidden;
            background: url('assets/bg.jpg') no-repeat center center fixed;
            background-size: cover;
        }
        .draggable {
            touch-action: none; /* Позволяет нам самим управлять движением */
            cursor: grab;
            transition: transform 0.2s;
        }
        .draggable:active { cursor: grabbing; }
        .house-zone { transition: all 0.3s; }
        .shake { animation: shake 0.5s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
    </style>
</head>
<body class="h-screen flex flex-col items-center justify-between p-4 font-sans">

    <!-- Заголовок -->
    <div class="bg-white/80 p-3 rounded-2xl shadow-lg mt-2">
        <h1 class="text-xl md:text-2xl font-bold text-blue-800 text-center">Разложи картинки по домикам</h1>
    </div>

    <!-- Область с предметами -->
    <div id="items-container" class="flex flex-wrap justify-center gap-4 p-4 min-h-[150px]">
        <!-- Картинки появятся здесь -->
    </div>

    <!-- Домики -->
    <div class="flex justify-around w-full max-w-4xl mb-8">
        <div id="house1" class="house-zone flex flex-col items-center" data-syllables="1">
            <img src="assets/house1.png" class="w-24 md:w-40 drop-shadow-xl">
            <span class="bg-white px-3 rounded-full font-bold mt-2">1 слог</span>
        </div>
        <div id="house2" class="house-zone flex flex-col items-center" data-syllables="2">
            <img src="assets/house2.png" class="w-24 md:w-40 drop-shadow-xl">
            <span class="bg-white px-3 rounded-full font-bold mt-2">2 слога</span>
        </div>
        <div id="house3" class="house-zone flex flex-col items-center" data-syllables="3">
            <img src="assets/house3.png" class="w-24 md:w-40 drop-shadow-xl">
            <span class="bg-white px-3 rounded-full font-bold mt-2">3 слога</span>
        </div>
    </div>

    <script>
        const itemsData = [
            { id: 'lev', img: 'assets/lev.png', syllables: 1 },
            { id: 'mak', img: 'assets/mak.png', syllables: 1 },
            { id: 'kot', img: 'assets/kot.png', syllables: 1 },
            { id: 'lisa', img: 'assets/lisa.png', syllables: 2 },
            { id: 'pauk', img: 'assets/pauk.png', syllables: 2 },
            { id: 'fish', img: 'assets/fish.png', syllables: 2 },
            { id: 'cow', img: 'assets/cow.png', syllables: 3 },
            { id: 'tree', img: 'assets/tree.png', syllables: 3 },
            { id: 'car', img: 'assets/car.png', syllables: 3 }
        ];

        let activeItem = null;
        let startX, startY, initialX, initialY;

        const container = document.getElementById('items-container');

        // Создаем карточки
        function initGame() {
            // Перемешиваем
            itemsData.sort(() => Math.random() - 0.5);
            
            itemsData.forEach(item => {
                const img = document.createElement('img');
                img.src = item.img;
                img.className = 'draggable w-20 h-20 md:w-28 md:h-28 object-contain bg-white rounded-xl p-1 shadow-md';
                img.dataset.syllables = item.syllables;
                
                // Добавляем события для мыши и тача
                img.addEventListener('mousedown', startDragging);
                img.addEventListener('touchstart', startDragging, {passive: false});
                
                container.appendChild(img);
            });
        }

        function startDragging(e) {
            e.preventDefault();
            activeItem = e.target;
            
            const clientX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
            const clientY = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;
            
            const rect = activeItem.getBoundingClientRect();
            startX = clientX - rect.left;
            startY = clientY - rect.top;
            
            activeItem.style.position = 'fixed';
            activeItem.style.zIndex = 1000;
            moveAt(clientX, clientY);

            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mouseup', onMouseUp);
            document.addEventListener('touchmove', onMouseMove, {passive: false});
            document.addEventListener('touchend', onMouseUp);
        }

        function moveAt(clientX, clientY) {
            activeItem.style.left = clientX - startX + 'px';
            activeItem.style.top = clientY - startY + 'px';
        }

        function onMouseMove(e) {
            const clientX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
            const clientY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;
            moveAt(clientX, clientY);
        }

        function onMouseUp(e) {
            const clientX = e.type === 'touchend' ? e.changedTouches[0].clientX : e.clientX;
            const clientY = e.type === 'touchend' ? e.changedTouches[0].clientY : e.clientY;
            
            activeItem.style.display = 'none';
            const elementBelow = document.elementFromPoint(clientX, clientY);
            activeItem.style.display = 'block';

            const house = elementBelow ? elementBelow.closest('.house-zone') : null;

            if (house && house.dataset.syllables === activeItem.dataset.syllables) {
                // Правильно
                activeItem.remove();
                house.style.transform = 'scale(1.1)';
                setTimeout(() => house.style.transform = 'scale(1)', 200);
                checkWin();
            } else {
                // Ошибка или мимо
                activeItem.style.position = 'static';
                if (house) {
                    house.classList.add('shake');
                    setTimeout(() => house.classList.remove('shake'), 500);
                }
            }

            document.removeEventListener('mousemove', onMouseMove);
            document.removeEventListener('mouseup', onMouseUp);
            document.removeEventListener('touchmove', onMouseMove);
            document.removeEventListener('touchend', onMouseUp);
            activeItem = null;
        }

        function checkWin() {
            if (container.children.length === 0) {
                alert('Ура! Все картинки дома!');
                location.reload();
            }
        }

        initGame();
    </script>
</body>
</html>
