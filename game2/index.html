<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Соня и Сима: Умная версия</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            touch-action: none; 
            overflow: hidden;
            background: url('./assets/bg.png') no-repeat center center fixed;
            background-size: cover;
            background-color: #e0f2fe;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        /* --- БАЗОВЫЕ СТИЛИ (КОМПЬЮТЕР) --- */
        .character { 
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); 
            width: 250px; 
            z-index: 20;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.2));
        }
        .basket { width: 200px; z-index: 10; }
        .card { 
            touch-action: none; 
            cursor: grab; 
            z-index: 100; 
            width: 200px; 
            height: 200px;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        /* --- АДАПТАЦИЯ ДЛЯ ТЕЛЕФОНОВ (МОБИЛЬНЫЕ) --- */
        @media (max-width: 900px) {
            /* Уменьшаем элементы, чтобы всё влезло горизонтально */
            .character { width: 120px; }
            .basket { width: 100px; }
            .card { width: 130px; height: 130px; }
            
            /* Делаем панель счета компактнее */
            .score-panel { padding: 0.5rem !important; }
            h1 { font-size: 0.875rem !important; }
        }

        /* Дополнительная подстройка для очень низких экранов (ландшафт) */
        @media (max-height: 450px) {
            .character { width: 100px; }
            .basket { width: 80px; }
            .card { width: 110px; height: 110px; }
        }

        .shake { animation: shake 0.5s; }
        @keyframes shake {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-10deg); }
            75% { transform: rotate(10deg); }
        }

        .walkway {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            position: relative;
            width: 100%;
            height: 100%;
            padding: 0 5%;
        }
    </style>
</head>
<body class="h-screen flex flex-col items-center justify-between py-2">

    <!-- Верхняя панель -->
    <div class="w-full max-w-6xl px-4 flex justify-between items-center z-50 mt-1 score-panel">
        <div class="bg-white/90 p-3 rounded-2xl shadow-lg border-b-4 border-blue-400 flex-1 mr-4">
            <h1 class="text-lg md:text-2xl font-black text-blue-900 leading-tight">СОНЯ И СИМА</h1>
        </div>
        
        <div class="bg-yellow-400 p-2 md:p-4 rounded-2xl shadow-lg border-2 border-white min-w-[80px] md:min-w-[140px] text-center">
            <span id="score-val" class="text-xl md:text-3xl font-black text-blue-900">0</span>
        </div>
    </div>

    <!-- Зона появления карточек -->
    <div id="cards-spawn" class="flex-1 w-full relative flex justify-center items-center"></div>

    <!-- Игровое поле -->
    <div class="w-full h-[40vh] md:h-[50vh] flex flex-row mb-4">
        
        <!-- Дорожка Сони -->
        <div class="w-1/2 h-full walkway border-r border-white/20">
            <img id="sonya" src="./assets/sonya.png" class="character" style="transform: translateX(0);" alt="Соня">
            <div id="basket-s" class="basket flex flex-col items-center" data-sound="hard">
                <img src="./assets/basket_s.png" alt="Корзина С">
                <span class="bg-blue-600 px-2 md:px-4 py-0.5 rounded-full text-[10px] md:text-sm font-bold text-white shadow-md uppercase">Соня [С]</span>
            </div>
        </div>

        <!-- Дорожка Симы -->
        <div class="w-1/2 h-full walkway">
            <div id="basket-si" class="basket flex flex-col items-center" data-sound="soft">
                <img src="./assets/basket_si.png" alt="Корзина Сь">
                <span class="bg-green-600 px-2 md:px-4 py-0.5 rounded-full text-[10px] md:text-sm font-bold text-white shadow-md uppercase">Сима [Сь]</span>
            </div>
            <!-- Проверь название файла Sima.png -->
            <img id="sima" src="./assets/Sima.png" class="character" style="transform: translateX(0);" alt="Сима">
        </div>

    </div>

    <script>
        const cardsData = [
            { img: './assets/sanki.png', type: 'hard' },
            { img: './assets/sumka.png', type: 'hard' },
            { img: './assets/samovar.png', type: 'hard' },
            { img: './assets/slon.png', type: 'hard' },
            { img: './assets/syrok.png', type: 'hard' },
            { img: './assets/seven.png', type: 'soft' },
            { img: './assets/siren.png', type: 'soft' },
            { img: './assets/sinica.png', type: 'soft' },
            { img: './assets/ceno.png', type: 'soft' },
            { img: './assets/serdce.png', type: 'soft' }
        ];

        let score = 0;
        let sonyaSteps = 0;
        let simaSteps = 0;
        const totalSteps = 5;

        function updateScore(points) {
            score += points;
            if (score < 0) score = 0;
            document.getElementById('score-val').innerText = score;
        }

        function createCard() {
            const spawnZone = document.getElementById('cards-spawn');
            spawnZone.innerHTML = '';
            if (cardsData.length === 0) {
                setTimeout(() => {
                    alert(`Победа! Ты набрал ${score} очков.`);
                    location.reload();
                }, 800);
                return;
            }
            const index = Math.floor(Math.random() * cardsData.length);
            const data = cardsData.splice(index, 1)[0];
            const card = document.createElement('img');
            card.src = data.img;
            card.className = 'card object-contain bg-white rounded-3xl p-3 shadow-2xl border-4 border-yellow-300';
            card.dataset.type = data.type;
            card.onerror = () => createCard();
            card.addEventListener('mousedown', startDrag);
            card.addEventListener('touchstart', startDrag, {passive: false});
            spawnZone.appendChild(card);
        }

        let currentCard = null;
        let shiftX, shiftY;

        function startDrag(e) {
            e.preventDefault();
            currentCard = e.target;
            const cx = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            const cy = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
            const rect = currentCard.getBoundingClientRect();
            shiftX = cx - rect.left;
            shiftY = cy - rect.top;
            currentCard.style.position = 'fixed';
            currentCard.style.zIndex = 1000;
            moveAt(cx, cy);
            document.addEventListener('mousemove', onMove);
            document.addEventListener('touchmove', onMove, {passive: false});
            document.addEventListener('mouseup', onEnd);
            document.addEventListener('touchend', onEnd);
        }

        function moveAt(cx, cy) {
            currentCard.style.left = cx - shiftX + 'px';
            currentCard.style.top = cy - shiftY + 'px';
        }

        function onMove(e) {
            const cx = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            const cy = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
            moveAt(cx, cy);
        }

        function onEnd(e) {
            const cx = e.type.includes('touch') ? e.changedTouches[0].clientX : e.clientX;
            const cy = e.type.includes('touch') ? e.changedTouches[0].clientY : e.clientY;
            currentCard.style.visibility = 'hidden';
            const elemBelow = document.elementFromPoint(cx, cy);
            const dropZone = elemBelow ? elemBelow.closest('.basket') : null;
            currentCard.style.visibility = 'visible';

            if (dropZone && dropZone.dataset.sound === currentCard.dataset.type) {
                updateScore(10);
                if (dropZone.id === 'basket-s') {
                    sonyaSteps++;
                    const moveX = (sonyaSteps / totalSteps) * 35; 
                    document.getElementById('sonya').style.transform = `translateX(${moveX}vw)`;
                } else {
                    simaSteps++;
                    const moveX = (simaSteps / totalSteps) * -35; 
                    document.getElementById('sima').style.transform = `translateX(${moveX}vw)`;
                }
                currentCard.remove();
                setTimeout(createCard, 500);
            } else {
                updateScore(-5);
                if (dropZone) {
                    const girlId = dropZone.id === 'basket-s' ? 'sima' : 'sonya';
                    document.getElementById(girlId).classList.add('shake');
                    setTimeout(() => document.getElementById(girlId).classList.remove('shake'), 500);
                }
                currentCard.style.position = 'absolute';
                currentCard.style.left = '50%';
                currentCard.style.top = '50%';
                currentCard.style.transform = 'translate(-50%, -50%)';
            }
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('touchmove', onMove);
            document.removeEventListener('mouseup', onEnd);
            document.removeEventListener('touchend', onEnd);
            currentCard = null;
        }

        window.onload = createCard;
    </script>
</body>
</html>
